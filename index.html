<!DOCTYPE html>
<html>
<head>
  <title>Laufroute</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 85vh; }
    #controls { padding: 10px; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="controls">
  <button onclick="saveRoute()">Speichern</button>
  <button onclick="loadRoute()">Laden</button>
  <button onclick="clearRoute()">Reset</button>
  <p>Distanz: <span id="distance">0</span> km</p>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([48.137, 11.575], 13); // München

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let points = [];
let routeLine = null;

map.on('click', function(e) {
  points.push([e.latlng.lat, e.latlng.lng]);
  L.marker(e.latlng).addTo(map);

  if (points.length > 1) {
    drawRoute();
  }
});

async function drawRoute() {
  const apiKey = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjI1NDlkMzMzODE4MjQ4NjViZGI0Mjc3MDRhMjc5MjczIiwiaCI6Im11cm11cjY0In0=";

  const response = await fetch(
    "https://api.openrouteservice.org/v2/directions/foot-walking",
    {
      method: "POST",
      headers: {
        "Authorization": apiKey,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        coordinates: points.map(p => [p[1], p[0]])
      })
    }
  );

  const data = await response.json();

  const coords = data.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
  const distance = data.features[0].properties.summary.distance / 1000;

  if (routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline(coords, {color: 'blue'}).addTo(map);

  document.getElementById("distance").innerText = distance.toFixed(2);
}

function saveRoute() {
  localStorage.setItem("route", JSON.stringify(points));
  alert("Gespeichert");
}

function loadRoute() {
  const saved = JSON.parse(localStorage.getItem("route"));
  if (!saved) return;

  points = saved;

  map.eachLayer(layer => {
    if (layer instanceof L.Marker || layer instanceof L.Polyline) {
      map.removeLayer(layer);
    }
  });

  points.forEach(p => {
    L.marker(p).addTo(map);
  });

  drawRoute();
}

function clearRoute() {
  points = [];
  map.eachLayer(layer => {
    if (layer instanceof L.Marker || layer instanceof L.Polyline) {
      map.removeLayer(layer);
    }
  });

  document.getElementById("distance").innerText = "0";
}
</script>

</body>
</html>
