<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Laufroute</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>

<h1>LAUFROUTE v1.4</h1>
<h2> Kleines DIY Projekt. Keine logs, Kein Tracking.. nix. Einfach ein nettes Tool um wege zu markieren.</h2>

<div class="toolbar">
    <button onclick="undoPoint()">Undo</button>
    <button onclick="clearRoute()">Reset</button>
    <button onclick="exportRoute()">Export</button>

    <button onclick="document.getElementById('fileInput').click()">
        Import
    </button>

    <input id="fileInput" type="file" accept=".json" onchange="importRoute(event)" hidden>

    <span id="distance">Distanz: 0 km</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
